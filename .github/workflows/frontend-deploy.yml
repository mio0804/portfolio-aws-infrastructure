name: Frontend App Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'nginx.conf'
      - 'Dockerfile.frontend'
  workflow_dispatch:

permissions:
  id-token: write # OIDC認証に必須
  contents: read

jobs:
  deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ECR へログイン
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Frontend Docker イメージを build & push
      - name: Build, tag, and push image to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/portfolio-front-repo:latest
          build-args: |
            VITE_USE_COGNITO=true
            VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }}
            VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }}
            VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN }}
            VITE_COGNITO_REDIRECT_URI=https://animalog-nabinemu.com/callback
            VITE_COGNITO_LOGOUT_URI=https://animalog-nabinemu.com/login

      # サービスの更新（新しいイメージで再デプロイ）
      - name: Force new deployment to ECS
        run: |
          aws ecs update-service \
            --cluster portfolio-cluster \
            --service portfolio-frontend-service \
            --force-new-deployment
