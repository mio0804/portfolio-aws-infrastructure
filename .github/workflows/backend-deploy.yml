name: Backend App Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

permissions:
  id-token: write # OIDC認証に必須
  contents: read

jobs:
  deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4のハッシュ固定

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4のハッシュ固定
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ECR へログイン
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a  # v2のハッシュ固定

      # Backend Docker イメージを build & push
      - name: Build, tag, and push image to Amazon ECR
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5のハッシュ固定
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/portfolio-back-repo:latest

      # サービスの更新（新しいイメージで再デプロイ）
      - name: Force new deployment to ECS
        run: |
          aws ecs update-service \
            --cluster portfolio-cluster \
            --service portfolio-backend-service \
            --force-new-deployment
